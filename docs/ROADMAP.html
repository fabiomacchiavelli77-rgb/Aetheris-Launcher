<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AristoSeedCrack v1.1.0 — Sviluppo Roadmap</title>
<style>
  :root {
    --bg: #f0f2f5;
    --text: #1a1a1a;
    --muted: #555;
    --accent: #7c3aed;
    --accent2: #4f46e5;
    --border: rgba(255, 255, 255, 0.3);
    --code-bg: rgba(255, 255, 255, 0.5);
    --table-stripe: rgba(255, 255, 255, 0.4);
    --success-bg: #d1fae5;
    --success-border: #10b981;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, #e0eafc, #cfdef3);
    line-height: 1.7;
    max-width: 900px;
    margin: 40px auto;
    padding: 40px 30px;
    border-radius: 16px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    animation: fadeIn 0.8s ease-out forwards;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .header { text-align: center; padding: 40px 0 20px; border-bottom: 3px solid var(--accent); margin-bottom: 40px; }
  .header h1 { font-size: 2.2em; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
  .header .subtitle { font-size: 1.1em; color: var(--muted); margin-bottom: 20px; }
  .header .version { display: inline-block; background: var(--accent); color: #fff; padding: 4px 18px; border-radius: 20px; font-weight: 700; font-size: 0.9em; }
  h2 { font-size: 1.4em; margin: 30px 0 15px; padding-bottom: 8px; border-bottom: 2px solid var(--border); color: var(--accent2); }
  .todo-list { list-style: none; padding: 0; margin: 15px 0; }
  .todo-list li { display: flex; align-items: flex-start; padding: 12px 16px; border-radius: 10px; background: rgba(255,255,255,0.6); margin: 10px 0; border: 1px solid var(--border); transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  .todo-list li:hover { transform: translateX(5px); background: rgba(255,255,255,0.8); }
  .todo-list input[type="checkbox"] { margin-top: 6px; margin-right: 15px; width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
  .todo-list label { cursor: pointer; flex: 1; }
  .todo-list code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-family: monospace; border: 1px solid var(--border); }
  .footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 0.85em; }
</style>
</head>
<body>

<div class="header">
  <h1>Roadmap & Sviluppo Checklist</h1>
  <div class="subtitle">AristoSeedCrack v1.1.0</div>
  <div class="version">Roadmap HTML</div>
</div>

<h2>Fase 1: Fondamenta (file indipendenti, nessun impatto UI)</h2>
<ul class="todo-list">
  <li>
    <input type="checkbox" id="f1-1" checked>
    <label for="f1-1"><strong>Configuration.java</strong> — Aggiungere campi <code>seedCracker</code>, <code>antiDetection</code> con builder methods relativi.</label>
  </li>
  <li>
    <input type="checkbox" id="f1-2" checked>
    <label for="f1-2"><strong>CheckBox.java</strong> — Aggiungere callback <code>onChange</code> con setter <code>withOnChange(Runnable)</code>.</label>
  </li>
  <li>
    <input type="checkbox" id="f1-3" checked>
    <label for="f1-3"><strong>JarPatcher.java</strong> — Creare utility per patchare metadata JAR (fabric.mod.json, mcmod.info).</label>
  </li>
  <li>
    <input type="checkbox" id="f1-4" checked>
    <label for="f1-4"><strong>SeedCrackerManager.java</strong> — Creare singleton per gestione e download (deprecato a favore della versione embedded in resources per compatibilità offline).</label>
  </li>
</ul>

<h2>Fase 2: Provider Interface</h2>
<ul class="todo-list">
  <li>
    <input type="checkbox" id="f2-1" checked>
    <label for="f2-1"><strong>Provider.java</strong> — Aggiungere il metodo di default <code>installSeedCracker()</code>.</label>
  </li>
</ul>

<h2>Fase 3: UI e Collegamento (Wiring)</h2>
<ul class="todo-list">
  <li>
    <input type="checkbox" id="f3-1" checked>
    <label for="f3-1"><strong>SetupScene.java</strong> — Aggiungere checkbox "Install SeedCrackerX" e "Anti-detection patch" con gestione interdipendenza da Forge.</label>
  </li>
  <li>
    <input type="checkbox" id="f3-2" checked>
    <label for="f3-2"><strong>WelcomeScene.java</strong> — Inserire bootstrap di pre-fetch (reso non bloccante).</label>
  </li>
  <li>
    <input type="checkbox" id="f3-3" checked>
    <label for="f3-3"><strong>InstallingScene.java</strong> — Aggiungere chiamata a <code>installSeedCracker()</code> e il ciclo di patching dell'anti-detection all'interno del metodo <code>run()</code>.</label>
  </li>
</ul>

<h2>Fase 4: Build e Verifica</h2>
<ul class="todo-list">
  <li>
    <input type="checkbox" id="f4-1" checked>
    <label for="f4-1"><code>./gradlew compileJava</code> — Compilazione pulita completata.</label>
  </li>
  <li>
    <input type="checkbox" id="f4-2" checked>
    <label for="f4-2"><code>./gradlew shadowJar</code> — Compilazione del file JAR distribuibile completata.</label>
  </li>
  <li>
    <input type="checkbox" id="f4-3">
    <label for="f4-3">Test manuale Seed Cracker: installare con checkbox, verificare la presenza di <code>SeedCrackerX.jar</code> nella cartella mods.</label>
  </li>
  <li>
    <input type="checkbox" id="f4-4">
    <label for="f4-4">Test manuale Anti-Detection: installare spuntando la casella, aprire il JAR e controllare che <code>fabric.mod.json</code> sia patchato.</label>
  </li>
  <li>
    <input type="checkbox" id="f4-5">
    <label for="f4-5">Test manuale Forge: verificare che la modalità Forge escluda correttamente l'installazione di SeedCrackerX mostrando un avviso.</label>
  </li>
  <li>
    <input type="checkbox" id="f4-6">
    <label for="f4-6">Test manuale offline: verificare che l'assenza di connessione internet non impedisca l'avvio e il completamento dell'installazione di base.</label>
  </li>
</ul>

<div class="footer">
  AristoSeedCrack v1.1.0 &middot; Roadmap HTML &middot; Uso Personale
</div>

</body>
</html>
